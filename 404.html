<html lang="en">
<head>

    <title>404: Signal Lost | Jaume Puig</title>
    <link rel="icon" href="assets/images/icon.svg" type="image/svg+xml">

    <link rel="preconnect" href="https://fonts.googleapis.com">

    <style>
        body { min-height: 100vh; display: flex; align-items: center; justify-content: center; text-align: center; padding: var(--space-lg); }
        .error-code {
            font-family: var(--font-mono);
            font-size: clamp(4rem, 14vw, 8rem);
            color: var(--color-accent);
            line-height: 1;
            letter-spacing: -0.02em;
            text-shadow: 0 0 40px var(--color-accent-glow);
        }
        .error-title { margin: var(--space-md) 0 var(--space-sm); font-size: 1.5rem; }
        .error-body { color: var(--color-text-muted); max-width: 420px; margin: 0 auto var(--space-xl); }
        .error-actions { display: flex; gap: var(--space-md); justify-content: center; flex-wrap: wrap; }
    </style>
</head>
<body>
    <div>
        <div class="eyebrow" style="justify-content:center;">Signal Lost</div>
        <div class="error-code">404</div>
        <h1 class="error-title">This coordinate doesn't resolve.</h1>
        <p class="error-body">The page you're looking for has moved, been renamed, or never existed. Let's get you back on trajectory.</p>
        <div class="error-actions">
            <a href="index.html" class="button button-primary">Return to Overview</a>
            <a href="index.html#contact" class="button button-secondary">Contact Me</a>
        </div>
    </div>
